<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator - Pro Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/quiz.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../js/quiz.js" defer></script>
</head>
<body>
    <div class="app-container">
        <div class="preview-wrapper">
            <div class="preview-label">Live Preview</div>
            <div id="original-preview-container" style="width: 100%; display: flex; justify-content: center;">
                <div id="post-canvas" class="ratio-4-5">
                    <div class="quiz-wrapper" id="quiz-container">
                        <div class="header" id="display-header">QUIZ TIME <span id="display-mark">?</span></div>
                        <div class="question" id="display-question">What does the z-index property in CSS control?</div>
                        <div class="options-container">
                            <div class="option"><span class="option-num">1.</span> <span id="display-opt1">The transparency</span></div>
                            <div class="option"><span class="option-num">2.</span> <span id="display-opt2">The stacking order</span></div>
                            <div class="option"><span class="option-num">3.</span> <span id="display-opt3">The zoom level</span></div>
                            <div class="option"><span class="option-num">4.</span> <span id="display-opt4">The font size</span></div>
                        </div>
                    </div>
                    <div class="watermark" id="display-watermark">© STACKBYUJJWAL</div>
                </div>
            </div>
        </div>

        <div class="editor-panel">
            <div class="panel-header"><h1>Edit Quiz Design</h1></div>
            <div class="panel-content">
                <details class="control-section" open>
                    <summary class="section-summary">Content & Text</summary>
                    <div class="section-content">
                        <div class="input-group">
                            <label class="input-label">Question Text</label>
                            <textarea class="saas-input" oninput="updateText('display-question', this.value)">What does the z-index property in CSS control?</textarea>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Options</label>
                            <input type="text" class="saas-input" style="margin-bottom:8px;" value="The transparency" oninput="updateText('display-opt1', this.value)">
                            <input type="text" class="saas-input" style="margin-bottom:8px;" value="The stacking order" oninput="updateText('display-opt2', this.value)">
                            <input type="text" class="saas-input" style="margin-bottom:8px;" value="The zoom level" oninput="updateText('display-opt3', this.value)">
                            <input type="text" class="saas-input" value="The font size" oninput="updateText('display-opt4', this.value)">
                        </div>
                    </div>
                </details>
                <details class="control-section" open>
                    <summary class="section-summary">Styling & Colors</summary>
                    <div class="section-content">
                        <div class="input-group">
                            <label class="input-label">Theme Color & Background</label>
                            <div class="color-row">
                                <input type="color" value="#3a86ff" oninput="updateTheme(this.value)">
                                <input type="color" value="#0d1b2a" oninput="updateBgColor(this.value)">
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Watermark</label>
                            <input type="text" class="saas-input" value="© STACKBYUJJWAL" oninput="updateText('display-watermark', this.value)">
                        </div>
                    </div>
                </details>
            </div>
            <div class="panel-actions">
                <button class="download-btn" onclick="openDownloadModal()">Export Post</button>
            </div>
        </div>
    </div>

    <div id="download-modal" class="modal-overlay">
        <div class="modal-content large-modal">
            <div class="modal-header">
                <h2>Export Settings</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body split-view">
                <div class="modal-preview-side" id="modal-preview-container">
                    </div>
                
                <div class="modal-settings-side">
                    <div class="input-group">
                        <label class="input-label">Platform (Aspect Ratio)</label>
                        <select id="export-ratio" class="saas-input" onchange="previewRatio(this.value)">
                            <option value="ratio-4-5">Instagram Portrait (4:5)</option>
                            <option value="ratio-1-1">Instagram Square (1:1)</option>
                            <option value="ratio-9-16">Story / Reels (9:16)</option>
                            <option value="ratio-16-9">YouTube / Twitter (16:9)</option>
                            <option value="ratio-custom">Custom Size</option>
                        </select>
                    </div>
                    
                    <div id="custom-size-inputs" style="display: none; gap: 10px; margin-bottom: 16px;">
                        <div style="flex: 1;"><label class="input-label">Width</label><input type="number" id="custom-width" class="saas-input" value="1080" oninput="applyCustomRatio()"></div>
                        <div style="flex: 1;"><label class="input-label">Height</label><input type="number" id="custom-height" class="saas-input" value="1080" oninput="applyCustomRatio()"></div>
                    </div>

                    <div class="input-group">
                        <label class="input-label" style="color:var(--accent);">Content Shrink / Grow</label>
                        <input type="range" min="0.4" max="1.5" step="0.05" value="1" oninput="updateContentScale(this.value)">
                        <span style="font-size: 10px; color:#888;">Slide to fit content perfectly in the box</span>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Image Format</label>
                        <select id="export-format" class="saas-input">
                            <option value="png">PNG (High Quality)</option>
                            <option value="jpeg">JPG (Smaller Size)</option>
                        </select>
                    </div>
                    <button class="download-btn final-download-btn" onclick="executeDownload()">Download Image</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

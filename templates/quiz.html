<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackByUjjwal Quiz Generator</title>
    <link rel="stylesheet" href="../css/quiz.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="editor-container">
        
        <div id="post-card">
            <div class="header">QUIZ TIME <span>?</span></div>
            
            <div class="question" id="card-question">
                What does the <code>z-index</code> property in CSS control?
            </div>

            <div class="options-container">
                <div class="option"><span class="option-num">1.</span> <span id="card-opt1">The transparency</span></div>
                <div class="option"><span class="option-num">2.</span> <span id="card-opt2">The stacking order</span></div>
                <div class="option"><span class="option-num">3.</span> <span id="card-opt3">The zoom level</span></div>
                <div class="option"><span class="option-num">4.</span> <span id="card-opt4">The font size</span></div>
            </div>
            
            <div class="watermark">© StackByUjjwal</div>
        </div>

        <div class="controls">
            <h3>Edit Post Content</h3>
            
            <div class="input-group">
                <label>Question Text (HTML allowed)</label>
                <textarea rows="3" oninput="updateText('card-question', this.value)">What does the <code>z-index</code> property in CSS control?</textarea>
            </div>

            <div class="input-group">
                <label>Option 1</label>
                <input type="text" value="The transparency" oninput="updateText('card-opt1', this.value)">
            </div>
            <div class="input-group">
                <label>Option 2</label>
                <input type="text" value="The stacking order" oninput="updateText('card-opt2', this.value)">
            </div>
            <div class="input-group">
                <label>Option 3</label>
                <input type="text" value="The zoom level" oninput="updateText('card-opt3', this.value)">
            </div>
            <div class="input-group">
                <label>Option 4</label>
                <input type="text" value="The font size" oninput="updateText('card-opt4', this.value)">
            </div>
            <hr>
            <button class="download-btn" onclick="downloadPost()">Download Post</button>
            <p class="instructions">Clicking this will automatically export a 1080x1350 HQ image for Instagram.</p>
        </div>
    </div>

    <script src="../js/quiz.js"></script>
</body>
</html>
